name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: PHP ${{ matrix.php-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php-version: ['8.5']

    steps:
      - &checkout_step
        name: Checkout
        uses: actions/checkout@v6 # NOSONAR - reviewed action pin managed by workflow update policy.
      - name: Setup PHP
        uses: shivammathur/setup-php@v2 # NOSONAR - reviewed action pin managed by workflow update policy.
        with:
          php-version: ${{ matrix.php-version }}
          coverage: xdebug
          extensions: &php_extensions dom, gd, mbstring, pdo, pdo_mysql, zip
          tools: composer:v2

      - &prepare_config_step
        name: Prepare config
        run: cp config/config.sample.php config/config.php

      - &install_dependencies_step
        name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Lint PHP
        run: composer lint

      - name: Check code duplication
        run: composer duplication

      - name: Run unit tests
        run: composer test

  security:
    name: Security checks
    runs-on: ubuntu-latest
    steps:
      - *checkout_step

      - name: Setup PHP
        uses: shivammathur/setup-php@v2 # NOSONAR - reviewed action pin managed by workflow update policy.
        with:
          php-version: '8.5'
          coverage: none
          extensions: *php_extensions
          tools: composer:v2, phpstan

      - *prepare_config_step

      - *install_dependencies_step

      - name: SAST (PHPStan)
        run: composer analyse

      - name: Dependency audit
        run: composer audit --no-interaction

  toolbox-smoke:
    name: Toolbox smoke checks
    runs-on: ubuntu-latest
    steps:
      - *checkout_step

      - name: Setup PHP
        uses: shivammathur/setup-php@v2 # NOSONAR - reviewed action pin managed by workflow update policy.
        with:
          php-version: '8.5'
          coverage: none
          extensions: *php_extensions
          tools: composer:v2

      - *prepare_config_step

      - *install_dependencies_step

      - name: Start local PHP server
        run: |
          php -S 127.0.0.1:8080 -t . >/tmp/php-server.log 2>&1 &
          echo $! > /tmp/php-server.pid

      - name: Run toolbox checks with smoke
        env:
          TOOLS_SMOKE_BASE_URL: http://127.0.0.1:8080/index.php
        run: ./scripts/check-tools.sh --with-smoke

      - name: Stop local PHP server
        if: always()
        run: |
          if [[ -f /tmp/php-server.pid ]]; then
            kill "$(cat /tmp/php-server.pid)" || true
          fi
