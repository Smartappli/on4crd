name: Unit tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  php-tests:
    name: PHPUnit (PHP ${{ matrix.php-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php-version: ['8.5']

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          coverage: none
          extensions: dom, gd, mbstring, pdo, pdo_mysql, zip
          tools: composer:v2

      - name: Prepare config
        run: cp config/config.sample.php config/config.php

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Lint PHP
        run: composer lint

      - name: Check code duplication
        run: composer duplication

      - name: Run unit tests
        run: composer test

      - name: Static analysis for finalized modules and quality gates
        run: vendor/bin/phpstan analyse app/member_webotheque.php app/member_library_helpers.php app/member_module_documents.php app/album_helpers.php pages/webotheque.php pages/admin_webotheque.php pages/albums.php pages/idea_submit.php tools/lint.php tools/check_duplication.php tests/WebothequeHelpersTest.php tests/MemberModulesFinalizationTest.php tests/CodeDuplicationTest.php tests/ModuleUnitCoverageTest.php --no-progress --level=5 --memory-limit=1G

  toolbox-smoke-and-e2e:
    name: Toolbox smoke + Playwright E2E
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          coverage: none
          extensions: dom, gd, mbstring, pdo, pdo_mysql, zip
          tools: composer:v2

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Prepare config
        run: cp config/config.sample.php config/config.php

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Install Playwright dependencies
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Start local PHP server
        run: |
          php -S 127.0.0.1:8080 -t . >/tmp/php-server.log 2>&1 &
          echo $! > /tmp/php-server.pid

      - name: Run toolbox checks with smoke
        env:
          TOOLS_SMOKE_BASE_URL: http://127.0.0.1:8080/index.php
        run: ./scripts/check-tools.sh --with-smoke

      - name: Run Playwright E2E
        env:
          E2E_BASE_URL: http://127.0.0.1:8080/index.php
        run: npm run test:e2e

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-artifacts
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore

      - name: Stop local PHP server
        if: always()
        run: |
          if [[ -f /tmp/php-server.pid ]]; then
            kill "$(cat /tmp/php-server.pid)" || true
          fi
