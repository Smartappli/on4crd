name: Unit tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  php-tests:
    name: PHPUnit (PHP ${{ matrix.php-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php-version: ['8.3', '8.4']

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          coverage: none
          extensions: dom, gd, mbstring, pdo, pdo_mysql, zip
          tools: composer:v2

      - name: Prepare config
        run: cp config/config.sample.php config/config.php

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Lint PHP
        run: composer lint

      - name: Run unit tests
        run: composer test
