name: Composer metadata

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  composer-validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6 # NOSONAR - reviewed action pin managed by workflow update policy.

      - name: Setup PHP
        uses: shivammathur/setup-php@v2 # NOSONAR - reviewed action pin managed by workflow update policy.
        with:
          php-version: '8.5'
          coverage: none
          tools: composer:v2

      - name: Validate composer.json
        run: composer validate --strict --no-check-lock
