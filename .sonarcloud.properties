sonar.projectKey=Smartappli_on4crd
sonar.organization=smartappli-github

sonar.exclusions=vendor/**,node_modules/**,assets/vendor/**,playwright-report/**,test-results/**,var/**,tests/**,.github/**,docker/**,scripts/**,tools/**
sonar.cpd.exclusions=app/i18n/**,assets/sql/**

# PHP data/template loaders intentionally use require/include because several files
# return arrays or partial markup and must stay repeatable within the same request.
sonar.issue.ignore.multicriteria=repeatablePhpIncludes,sessionCookie,uploadPermissions,toolsAjaxUrl,toolsAjaxHtml
sonar.issue.ignore.multicriteria.repeatablePhpIncludes.ruleKey=php:S2003
sonar.issue.ignore.multicriteria.repeatablePhpIncludes.resourceKey=**/*.php

# Local HTTP runs need non-secure session cookies; production HTTPS still sets Secure.
sonar.issue.ignore.multicriteria.sessionCookie.ruleKey=php:S2092
sonar.issue.ignore.multicriteria.sessionCookie.resourceKey=app/bootstrap.php

# Uploaded files are made owner/group readable for the web server, never world-writable.
sonar.issue.ignore.multicriteria.uploadPermissions.ruleKey=php:S2612
sonar.issue.ignore.multicriteria.uploadPermissions.resourceKey=app/upload_helpers.php

# Tool panels are same-origin, server-rendered fragments with a fixed id allow-list.
sonar.issue.ignore.multicriteria.toolsAjaxUrl.ruleKey=jssecurity:S8476
sonar.issue.ignore.multicriteria.toolsAjaxUrl.resourceKey=assets/js/modules/tools.js
sonar.issue.ignore.multicriteria.toolsAjaxHtml.ruleKey=jssecurity:S5696
sonar.issue.ignore.multicriteria.toolsAjaxHtml.resourceKey=assets/js/modules/tools.js
