services:
  db:
    image: mysql:9.7
    container_name: on4crd-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_NAME:-on4crd}
      MYSQL_USER: ${DB_USER:-on4crd}
      MYSQL_PASSWORD: ${DB_PASS:?Set DB_PASS in .env}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASS:?Set DB_ROOT_PASS in .env}
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "127.0.0.1:${DB_HOST_PORT:-3307}:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$${MYSQL_ROOT_PASSWORD} --silent || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: on4crd-web
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-on4crd}
      DB_USER: ${DB_USER:-on4crd}
      DB_PASS: ${DB_PASS:?Set DB_PASS in .env}
      DB_ROOT_PASS: ${DB_ROOT_PASS:?Set DB_ROOT_PASS in .env}
      MYSQL_WAIT_TIMEOUT: ${MYSQL_WAIT_TIMEOUT:-120}
      APP_URL: ${APP_URL:-http://localhost:8080}
      ADMIN_CALLSIGN: ${ADMIN_CALLSIGN:-ON4CRD}
      ADMIN_NAME: ${ADMIN_NAME:-Administrateur local}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@on4crd.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?Set ADMIN_PASSWORD in .env}
      CSRF_KEY: ${CSRF_KEY:-}
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html

volumes:
  db_data:
