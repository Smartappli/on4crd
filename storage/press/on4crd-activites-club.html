<h1>Fiche presse activités du club</h1>
<p>Le club organise des réunions, ateliers, activations, animations, repas et projets collaboratifs tout au long de l’année.</p>
<p>Cette ressource peut être reprise par la presse locale pour annoncer une activité, expliquer le radioamateurisme ou présenter le club.</p>
