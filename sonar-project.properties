sonar.projectKey=Smartappli_on4crd
sonar.organization=smartappli-github

sonar.exclusions=vendor/**,node_modules/**,assets/vendor/**,playwright-report/**,test-results/**,var/**
sonar.test.inclusions=tests/**
sonar.cpd.exclusions=app/i18n/**,tests/**,assets/sql/**

# The i18n domain loaders intentionally use require because locale files return arrays
# and must stay repeatable when tests or pages load the same domain more than once.
sonar.issue.ignore.multicriteria=i18nRequire
sonar.issue.ignore.multicriteria.i18nRequire.ruleKey=php:S2003
sonar.issue.ignore.multicriteria.i18nRequire.resourceKey=app/i18n/*.php
